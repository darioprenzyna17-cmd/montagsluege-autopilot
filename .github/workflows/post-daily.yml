name: Daily Post

on:
  schedule:
    # 18:00 Europe/Zurich → 16:00 UTC (Sommerzeit) / 17:00 UTC (Winterzeit)
    # Wir nehmen 16:00 UTC, das matcht 18:00 MEZ Sommerzeit (CEST)
    - cron: "0 16 * * *"
  workflow_dispatch:  # erlaubt manuellen Trigger zum Testen

permissions:
  contents: write  # damit der Job queue.jsonl committen kann

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scheduler
        env:
          META_IG_BUSINESS_ACCOUNT_ID: ${{ secrets.META_IG_BUSINESS_ACCOUNT_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: python3 scheduler.py

      - name: Commit queue update
        run: |
          if [[ -n "$(git status --porcelain queue.jsonl)" ]]; then
            git config user.name "montagsluege-bot"
            git config user.email "bot@users.noreply.github.com"
            git add queue.jsonl
            git commit -m "chore: post für $(date +%F)"
            git push
          fi
